name: iOS dependencies

on:
  pull_request:
    branches:
      - ios/main
    paths:
      - ".github/workflows/ios-deps-ci.yml"
      - "CI/ios/deps/**"
      - "extern/icufilters.json"
      - "ios-deps/**"
      - "docs/ios-port/DEPENDENCY_LOCK.md"
      - "docs/ios-port/ROADMAP.md"
  push:
    branches:
      - ios/main
    paths:
      - ".github/workflows/ios-deps-ci.yml"
      - "CI/ios/deps/**"
      - "extern/icufilters.json"
      - "ios-deps/**"
      - "docs/ios-port/DEPENDENCY_LOCK.md"
      - "docs/ios-port/ROADMAP.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-deps-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    name: Lock and source policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Validate lock schema
        run: cmake -P CI/ios/deps/validate-lock.cmake
      - name: Test lock and manifest contract
        run: node CI/ios/deps/test-lock-contract.js
      - name: Validate shell syntax
        run: bash -n CI/ios/deps/*.sh

  ui-foundation:
    name: UI foundation ${{ matrix.platform }}
    needs: lock
    runs-on: macos-15
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform:
          - iphoneos
          - iphonesimulator
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      IOS_DEPLOYMENT_TARGET: "16.4"
      VCPKG_DISABLE_METRICS: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Select pinned Xcode 16.4
        run: |
          test -d "$DEVELOPER_DIR"
          test "$(xcodebuild -version | sed -n '1p')" = "Xcode 16.4"

      - name: Cache immutable downloads
        uses: actions/cache@v5
        with:
          path: |
            build/ios-deps/downloads
            build/ios-deps/asset-cache
            build/ios-deps/source-cache
            build/ios-deps/tooling
          key: ios-deps-sources-${{ hashFiles('ios-deps/dependencies.lock.json') }}

      - name: Build clean online prefix
        id: online
        run: |
          prefix="$(
            bash CI/ios/deps/build.sh \
              --platform "${{ matrix.platform }}" \
              --feature ui-foundation \
              --clean
          )"
          echo "prefix=$prefix" >>"$GITHUB_OUTPUT"

      - name: Validate every online archive member
        run: |
          bash CI/ios/deps/validate-prefix.sh \
            "${{ matrix.platform }}" \
            "${{ steps.online.outputs.prefix }}"

      - name: Validate online ICU host tools
        run: |
          bash CI/ios/deps/validate-host-tools.sh \
            ui-foundation \
            "build/ios-deps/${{ matrix.platform }}/vcpkg_installed" \
            arm64-osx \
            "${{ steps.online.outputs.prefix }}" \
            "build/ios-deps/${{ matrix.platform }}/installed-packages.json"

      - name: Link minimal application
        run: |
          bash CI/ios/deps/build-smoke.sh \
            "${{ matrix.platform }}" \
            "${{ steps.online.outputs.prefix }}"

      - name: Rebuild clean without network sources
        id: offline
        run: |
          prefix="$(
            bash CI/ios/deps/build.sh \
              --platform "${{ matrix.platform }}" \
              --feature ui-foundation \
              --clean \
              --offline
          )"
          echo "prefix=$prefix" >>"$GITHUB_OUTPUT"

      - name: Validate every offline archive member
        run: |
          bash CI/ios/deps/validate-prefix.sh \
            "${{ matrix.platform }}" \
            "${{ steps.offline.outputs.prefix }}"

      - name: Validate offline ICU host tools
        run: |
          bash CI/ios/deps/validate-host-tools.sh \
            ui-foundation \
            "build/ios-deps/${{ matrix.platform }}/vcpkg_installed" \
            arm64-osx \
            "${{ steps.offline.outputs.prefix }}" \
            "build/ios-deps/${{ matrix.platform }}/installed-packages.json"

      - name: Relink application from offline prefix
        run: |
          bash CI/ios/deps/build-smoke.sh \
            "${{ matrix.platform }}" \
            "${{ steps.offline.outputs.prefix }}"
          app="$(
            find "build/ios-deps/${{ matrix.platform }}/smoke" \
              -type d -name OpenMWDepsSmoke.app -print
          )"
          test -n "$app"
          test "$(printf '%s\n' "$app" | wc -l | tr -d ' ')" -eq 1

      - name: Archive simulator runtime input
        if: matrix.platform == 'iphonesimulator'
        run: |
          app="$(
            find "build/ios-deps/${{ matrix.platform }}/smoke" \
              -type d -name OpenMWDepsSmoke.app -print
          )"
          test -n "$app"
          test "$(printf '%s\n' "$app" | wc -l | tr -d ' ')" -eq 1
          runtime_input="build/ios-deps/${{ matrix.platform }}/runtime-input"
          mkdir -p "$runtime_input"
          tar -C "$(dirname "$app")" -czf \
            "${runtime_input}/OpenMWDepsSmoke.app.tar.gz" \
            "$(basename "$app")"
          test -s "${runtime_input}/OpenMWDepsSmoke.app.tar.gz"

      - name: Upload simulator runtime input
        if: matrix.platform == 'iphonesimulator'
        uses: actions/upload-artifact@v6
        with:
          name: ios-deps-ui-foundation-runtime-input-${{ github.sha }}
          path: build/ios-deps/${{ matrix.platform }}/runtime-input/OpenMWDepsSmoke.app.tar.gz
          if-no-files-found: error
          overwrite: true
          retention-days: 7

      - name: Collect SPDX and license evidence
        run: |
          bash CI/ios/deps/package-metadata.sh \
            "${{ matrix.platform }}" \
            "${{ steps.offline.outputs.prefix }}" \
            "build/ios-deps/${{ matrix.platform }}/metadata"

      - name: Upload UI foundation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-deps-ui-foundation-${{ matrix.platform }}-${{ github.sha }}
          path: |
            build/ios-deps/${{ matrix.platform }}/build-manifest.txt
            build/ios-deps/${{ matrix.platform }}/installed-packages.json
            build/ios-deps/${{ matrix.platform }}/metadata
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWDepsSmoke.app
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWJPEGProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWTurboJPEGProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWBoostProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWBulletProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWRecastProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWLuaProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWICUProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWMyGUIProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWYAMLProbe
            build/ios-deps/${{ matrix.platform }}/smoke/**/OpenMWSQLiteProbe
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/sdl2
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/lz4
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/zlib
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/freetype
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/libpng
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/png
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/libjpeg-turbo
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/jpeg
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/boost*
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/yaml-cpp
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/sqlite3
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/unofficial-sqlite3
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/bullet
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/bullet3
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libBulletCollision.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libLinearMath.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/recastnavigation
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libRecast.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libDetour.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libDetourTileCache.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libDebugUtils.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libyaml-cpp.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libsqlite3.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/lua
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/unofficial-lua
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/liblua.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/icu
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libicudata.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libicuuc.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libicui18n.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/arm64-osx/tools/icu
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/share/mygui
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/libMyGUIEngineStatic.a
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/lib/pkgconfig/MYGUIStatic.pc
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/include/MYGUI
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/include/sqlite3.h
            build/ios-deps/${{ matrix.platform }}/vcpkg_installed/**/include/sqlite3-vcpkg-config.h
            ios-deps/dependencies.lock.json
          if-no-files-found: warn
          overwrite: true
          retention-days: 7

  ui-foundation-runtime:
    name: UI foundation simulator runtime
    needs: ui-foundation
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Select pinned Xcode 16.4
        run: |
          test -d "$DEVELOPER_DIR"
          test "$(xcodebuild -version | sed -n '1p')" = "Xcode 16.4"

      - name: Download the exact simulator evidence artifact
        uses: actions/download-artifact@v6
        with:
          name: ios-deps-ui-foundation-runtime-input-${{ github.sha }}
          path: build/ios-deps/runtime-artifact

      - name: Restore exactly one simulator smoke application
        id: simulator_app
        run: |
          artifact_root="build/ios-deps/runtime-artifact"
          archives_file="build/ios-deps/runtime-artifact-archives.txt"
          find "$artifact_root" \
            -type f -name OpenMWDepsSmoke.app.tar.gz -print >"$archives_file"
          archive_count="$(wc -l <"$archives_file" | tr -d ' ')"
          if [[ "$archive_count" -ne 1 ]]; then
            printf 'Expected exactly one OpenMWDepsSmoke.app.tar.gz, found %d\n' \
              "$archive_count" >&2
            find "$artifact_root" -maxdepth 8 -print >&2
            exit 1
          fi
          archive="$(sed -n '1p' "$archives_file")"
          extracted_root="build/ios-deps/runtime-extracted"
          mkdir -p "$extracted_root"
          tar -xzf "$archive" -C "$extracted_root"

          apps_file="build/ios-deps/runtime-artifact-apps.txt"
          find "$extracted_root" \
            -type d -name OpenMWDepsSmoke.app -print >"$apps_file"
          app_count="$(wc -l <"$apps_file" | tr -d ' ')"
          if [[ "$app_count" -ne 1 ]]; then
            printf 'Expected exactly one OpenMWDepsSmoke.app, found %d\n' \
              "$app_count" >&2
            find "$extracted_root" -maxdepth 8 -print >&2
            exit 1
          fi
          app="$(sed -n '1p' "$apps_file")"
          plist="${app}/Info.plist"
          bundle_id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist")
          executable_name=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$plist")
          test "$bundle_id" = "org.openmw.ios.deps-smoke"
          test -n "$executable_name"
          test -x "${app}/${executable_name}"
          echo "app=$app" >>"$GITHUB_OUTPUT"

      - name: Execute UI probes on an iPhone Simulator
        run: |
          bash CI/ios/smoke-simulator.sh \
            "${{ steps.simulator_app.outputs.app }}" \
            "build/ios-deps/runtime-smoke" \
            "org.openmw.ios.deps-smoke" \
            "ui foundation PASS"

      - name: Upload simulator runtime evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-deps-ui-foundation-runtime-${{ github.sha }}-${{ github.run_attempt }}
          path: build/ios-deps/runtime-smoke
          if-no-files-found: warn
          retention-days: 7
